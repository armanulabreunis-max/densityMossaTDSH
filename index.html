<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoğunluk Laboratuvarı v2 - UFAGS</title>
    <style>
        body { display: flex; font-family: 'Segoe UI', sans-serif; margin: 0; background: #1a1a1a; color: white; height: 100vh; overflow: hidden; }
        
        /* Yan Menü */
        #menu { width: 280px; padding: 20px; background: #252525; overflow-y: auto; border-right: 3px solid #e67e22; }
        .item { 
            background: #333; border: 1px solid #444; padding: 12px; margin-bottom: 10px;
            cursor: pointer; border-radius: 8px; transition: 0.2s;
            display: flex; justify-content: space-between;
        }
        .item:hover { background: #e67e22; transform: scale(1.02); }
        .density-val { color: #f1c40f; font-weight: bold; }

        /* Deney Alanı */
        #stage { flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        
        /* Kap ve Su */
        #tank {
            width: 300px; height: 400px; border: 6px solid #ddd; border-top: none;
            position: relative; /* BU ÇOK ÖNEMLİ: İçindeki objeler artık burayı merkez alacak */
            background: rgba(255,255,255,0.05); border-radius: 0 0 15px 15px;
        }
        #water {
            position: absolute; bottom: 0; width: 100%; height: 200px; 
            background: rgba(0, 120, 255, 0.4); border-top: 3px solid #00d4ff; z-index: 1;
        }

        /* Madde (Küp) - ARTIK TANKIN İÇİNDE */
        #object {
            width: 50px; height: 50px; position: absolute;
            left: 125px; /* (300px tank - 50px küp) / 2 = Tam orta */
            top: -60px; /* Tankın hemen dışında başlar */
            z-index: 5; display: none;
            text-align: center; line-height: 50px; color: white; font-weight: bold;
            border-radius: 4px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #status { margin-top: 20px; font-size: 1.2rem; color: #ecf0f1; text-shadow: 1px 1px 2px black; }
    </style>
</head>
<body>

<div id="menu">
    <h2 style="color: #e67e22; text-align: center;">Maddeler</h2>
    <div id="item-list"></div>
</div>

<div id="stage">
    <div id="tank">
        <div id="object"></div> <div id="water"></div>
    </div>
    <div id="status">Listeden bir madde seçin.</div>
</div>

<script>
const substances = [
    { name: "Mercury", d: 13.6, color: "#95a5a6" },
    { name: "Gold", d: 19.3, color: "#f1c40f" },
    { name: "Iron", d: 7.8, color: "#7f8c8d" },
    { name: "Aluminium", d: 2.7, color: "#bdc3c7" },
    { name: "Glycerin", d: 1.26, color: "#ecf0f1" },
    { name: "Pure Water", d: 1.0, color: "#3498db" },
    { name: "Olive Oil", d: 0.92, color: "#f39c12" },
    { name: "Ice", d: 0.91, color: "#a2d9ce" },
    { name: "Oak Wood", d: 0.75, color: "#a04000" },
    { name: "Gasoline", d: 0.7, color: "#d35400" },
    { name: "Mushroom", d: 0.24, color: "#edbb99" }
];

const itemList = document.getElementById('item-list');
const obj = document.getElementById('object');
const statusText = document.getElementById('status');

substances.forEach(s => {
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `<span>${s.name}</span> <span class="density-val">${s.d}</span>`;
    div.onclick = () => dropObject(s);
    itemList.appendChild(div);
});

function dropObject(substance) {
    obj.style.display = 'block';
    obj.style.transition = 'none';
    obj.style.top = '-60px'; // Tankın tavanının hemen üstü
    obj.style.backgroundColor = substance.color;
    obj.innerText = substance.name.substring(0,2);
    statusText.innerText = substance.name + " bırakılıyor...";

    setTimeout(() => {
        let targetTop;
        // Koordinatlar artık tankın içine (400px boyuna) göre:
        const tankBottom = 350;    // 400 (boy) - 50 (küp) = Tam dibe değer
        const waterSurface = 150;  // 400 - 200 (su boyu) - 50 (küp) = Suyun üstüne değer
        const midWater = 250;      // Suyun içi

        if (substance.d > 1.0) {
            targetTop = tankBottom;
            obj.style.transition = 'top 2s ease-in';
        } else if (substance.d === 1.0) {
            targetTop = midWater;
            obj.style.transition = 'top 2.2s ease-out';
        } else {
            targetTop = waterSurface;
            obj.style.transition = 'top 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        }

        obj.style.top = targetTop + "px";

        setTimeout(() => {
            if (substance.d > 1) statusText.innerText = substance.name + " HAS SUNK! (d > 1)";
            else if (substance.d < 1) statusText.innerText = substance.name + " IS FLOATING (d < 1)";
            else statusText.innerText = substance.name + " HAS BEEN SUSPENDED! (d = 1)";
        }, 2000);
    }, 50);
}
</script>

</body>
</html>
